<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信号处理实验室</title>
  <script type="module" crossorigin src="/signal-analysis-lab/assets/index-AdUS3V3s.js"></script>
  <link rel="stylesheet" crossorigin href="/signal-analysis-lab/assets/index-lml_b9Wu.css">
</head>
<body>
<div class="run-progress" id="runProgress" aria-hidden="true">
  <div class="run-progress-fill" id="runProgressFill"></div>
  <div class="run-progress-label" id="runProgressLabel"><span data-i18n="运行中">运行中</span></div>
</div>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title"><span data-i18n="信号处理实验室">信号处理实验室</span></div>
    <div id="sidebarContent"></div>
    <div class="sidebar-actions">
      <button onclick="app.loadDemo()"><span data-i18n="📊 演示数据">📊 演示数据</span></button>
      <button onclick="app.clearAll()"><span data-i18n="🗑 清空画布">🗑 清空画布</span></button>
      <button onclick="app.exportProject()"><span data-i18n="💾 导出 JSON">💾 导出 JSON</span></button>
      <button onclick="document.getElementById('importJson').click()"><span data-i18n="📂 导入 JSON">📂 导入 JSON</span></button>
      <input type="file" id="importJson" accept=".json" style="display:none" onchange="app.importProject(event)">
      <button onclick="window.open('https://github.com/createskyblue/signal-analysis-lab','_blank')" data-i18n-title="GitHub 仓库" title="GitHub 仓库">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg> GitHub
      </button>
    </div>
  </div>
  <div class="canvas-panel" id="canvasPanel">
    <canvas class="grid-canvas" id="gridCanvas"></canvas>
    <svg class="connections-svg" id="connectionsSvg"></svg>
    <div class="viewport" id="viewport">
    </div>
    <div class="canvas-focus-crosshair" id="canvasFocusCrosshair" aria-hidden="true"><div class="canvas-focus-crosshair-h"></div><div class="canvas-focus-crosshair-v"></div></div>
    <div class="empty-hint" id="emptyHint">从左侧栏拖拽节点到画布<br>从输出端口 (右侧圆点) 拖拽到输入端口 (左侧圆点) 连线<br>画布空白处左键拖拽框选，拖动已选节点可整体移动<br>双击连线或右键直接删除，也可单击变红后再点删除<br>按 Delete 键删除选中节点 / F5 运行<br>鼠标中键拖拽平移视图 / 空格键复位<br><br>点击左下角「演示数据」可快速体验</div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="chart-panel" id="chartPanel">
    <div class="chart-header">
      <span data-i18n="波形显示">波形显示</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="run-btn" onclick="app.copyContext()" title="复制项目上下文到剪贴板，可粘贴到外部 AI 分析"><span data-i18n="📋 复制上下文">📋 复制上下文</span></button>
        <div class="auto-run-wrap" id="autoRunWrap">
          <button class="run-btn auto-btn" id="autoRunBtn" onclick="app.toggleAutoRun()">⏱</button>
          <input type="number" class="auto-interval" id="autoInterval" value="2" min="0.1" step="0.1" title="刷新间隔(秒)">
          <span data-i18n="秒" style="font-size:11px;color:#aaa;">秒</span>
          <div class="auto-bar-track"><div class="auto-bar-fill" id="autoBarFill"></div></div>
        </div>
        <label class="export-toggle"><input type="checkbox" id="autoExportCsv" onchange="app.scheduleSave()"><span data-i18n="自动导出">自动导出</span></label>
        <button class="run-btn" id="langToggle" onclick="I18N.setLocale(I18N.locale==='zh'?'en':'zh');window.app.rebuildAll();" title="Switch language">EN</button>
        <button class="run-btn" onclick="app.run()"><span data-i18n="▶ 运行 (F5)">▶ 运行 (F5)</span></button>
      </div>
    </div>
    <div class="chart-scroll-wrap">
      <div class="chart-scroll" id="chartScroll">
        <div style="text-align:center;color:#444;padding:40px 0;font-size:13px;" id="chartEmpty"><span data-i18n="运行后在此显示波形">运行后在此显示波形</span></div>
      </div>
      <div class="chart-scrollbar" id="chartScrollbar"><div class="chart-scrollbar-thumb" id="chartScrollbarThumb"></div></div>
    </div>
  </div>
</body>
</html>
